name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      SECRET_KEY: test-secret-key
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FLASK_ENV: testing

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linting
      run: |
        ruff check .
        ruff format --check .

    - name: Run unit tests
      run: |
        pytest tests/ -v --tb=short -m "not e2e"

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      SECRET_KEY: test-secret-key
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FLASK_ENV: testing
      TEST_BASE_URL: http://localhost:5000

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: playwright install --with-deps

    - name: Create and migrate test database
      run: |
        python -c "
        from app import create_app, db
        import os
        os.environ['DATABASE_URL'] = 'postgresql://postgres:postgres@localhost:5432/test_db'
        app = create_app('testing')
        with app.app_context():
            db.create_all()
            # Create test user for e2e tests
            from app.models.user import User
            test_user = User(email='test2@example.com')
            test_user.set_password('testpassword123')
            db.session.add(test_user)
            db.session.commit()
        "

    - name: Start Flask application
      run: |
        python run.py &
        FLASK_PID=$!
        echo $FLASK_PID > flask.pid
        sleep 10
        curl -f http://localhost:5000/ || (echo "Flask app failed to start" && exit 1)

    - name: Run E2E tests
      run: |
        pytest tests/e2e/ -v --tb=short --video=retain-on-failure

    - name: Stop Flask application
      run: |
        if [ -f flask.pid ]; then
          kill $(cat flask.pid) || true
        fi

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: test-results/
        retention-days: 30
