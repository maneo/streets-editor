name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: test-secret-key
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FLASK_ENV: testing
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      EXTRACTION_MODEL: google/gemini-2.5-pro

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linting
      run: |
        ruff check .
        ruff format --check .

    - name: Run unit tests
      run: |
        pytest tests/ -v --tb=short -m "not e2e"

  e2e-tests:
    runs-on: ubuntu-latest
    # Only run e2e tests on main branch pushes, not on PRs (to avoid conflicts)
    if: github.ref == 'refs/heads/main'

    env:
      SECRET_KEY: test-secret-key
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FLASK_ENV: testing
      FLASK_APP: run.py
      DATABASE_URL: ${{ secrets.DATABASE_URL_E2E }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      EXTRACTION_MODEL: google/gemini-2.5-pro

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: playwright install --with-deps

    - name: Run database migrations
      run: |
        flask db upgrade

    - name: Run e2e tests
      run: |
        chmod +x run_e2e_tests.sh
        ./run_e2e_tests.sh
