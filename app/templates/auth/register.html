{% extends "base.html" %}

{% block title %}Register - Streets Dictionary Editor{% endblock %}

{% block content %}
<div class="container" style="max-width: 28rem;">
    <div class="box">
        <h1 class="title is-4 has-text-centered">Register</h1>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="field">
                <label for="email" class="label">Email</label>
                <div class="control">
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        class="input"
                    >
                </div>
            </div>

            <div class="field">
                <label for="password" class="label">Password</label>
                <div class="control">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        minlength="6"
                        class="input"
                    >
                </div>
                <p class="help">Minimum 6 characters</p>
            </div>

            <div class="field">
                <div class="control">
                    <button type="submit" class="button is-primary is-fullwidth">
                        Register
                    </button>
                </div>
            </div>
        </form>

        <p class="has-text-centered has-text-grey is-size-7 mt-4">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="has-text-link">
                Login here
            </a>
        </p>
    </div>
</div>
{% endblock %}
