steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/streets-editor:$_TAG', '.']
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/streets-editor:$_TAG']
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _TAG: 'latest'
